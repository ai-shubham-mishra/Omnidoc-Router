name: Deploy Router to Azure Container Apps (Development)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: omnidoc_developers
  AZURE_LOCATION: switzerlandnorth
  ACR_NAME: omnidoc
  CONTAINER_APP_NAME: router-dev
  CONTAINER_APP_ENV: omnidoc-dev-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Container Apps Environment exists
        run: |
          if ! az containerapp env show --name ${{ env.CONTAINER_APP_ENV }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} &> /dev/null; then
            echo "Container Apps Environment does not exist. Creating..."
            az containerapp env create \
              --name ${{ env.CONTAINER_APP_ENV }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }}
          else
            echo "Container Apps Environment already exists."
          fi

      - name: Build and push to Azure Container Registry
        run: |
          # Enable admin credentials on ACR
          az acr update --name ${{ env.ACR_NAME }} --admin-enabled true
          
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image omnidoc-router:dev \
            --image omnidoc-router:dev-${{ github.sha }} \
            --file ./Dockerfile \
            .

      - name: Get ACR Credentials
        id: acr-creds
        run: |
          ACR_USERNAME=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} --query passwords[0].value -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "ACR_USERNAME=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Container Apps
        run: |
          # Check if container app exists and its state
          if az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} &> /dev/null; then
            PROVISIONING_STATE=$(az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.provisioningState -o tsv)
            echo "Container app exists with state: $PROVISIONING_STATE"
            
            if [ "$PROVISIONING_STATE" == "Failed" ]; then
              echo "Container app is in Failed state. Deleting..."
              az containerapp delete --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --yes
              echo "Deleted failed container app. Will create new one."
              
              # Create new container app
              az containerapp create \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --environment ${{ env.CONTAINER_APP_ENV }} \
                --image ${{ env.ACR_NAME }}.azurecr.io/omnidoc-router:dev \
                --target-port 8500 \
                --ingress external \
                --registry-server ${{ env.ACR_NAME }}.azurecr.io \
                --registry-username ${{ steps.acr-creds.outputs.ACR_USERNAME }} \
                --registry-password ${{ steps.acr-creds.outputs.ACR_PASSWORD }} \
                --cpu 0.25 \
                --memory 0.5Gi \
                --min-replicas 1 \
                --max-replicas 2 \
                --env-vars \
                  "MONGO_DB_URL=${{ secrets.MONGO_DB_URL }}" \
                  "MONGO_DB_NAME=${{ secrets.MONGO_DB_NAME }}" \
                  "REDIS_URL=" \
                  "SESSION_TTL_SECONDS=259200" \
                  "REGISTERED_WORKFLOW_COLLECTION_NAME=${{ secrets.REGISTERED_WORKFLOW_COLLECTION_NAME }}" \
                  "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" \
                  "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
                  "AGENTICAPI_BASE_URL=${{ secrets.AGENTICAPI_BASE_URL }}"
            else
              echo "Container app is healthy. Updating..."
              az containerapp registry set \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --server ${{ env.ACR_NAME }}.azurecr.io \
                --username ${{ steps.acr-creds.outputs.ACR_USERNAME }} \
                --password ${{ steps.acr-creds.outputs.ACR_PASSWORD }}
              
              az containerapp update \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --image ${{ env.ACR_NAME }}.azurecr.io/omnidoc-router:dev \
                --set-env-vars "AGENTICAPI_BASE_URL=${{ secrets.AGENTICAPI_BASE_URL }}"
            fi
          else
            echo "Container app does not exist. Creating..."
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_APP_ENV }} \
              --image ${{ env.ACR_NAME }}.azurecr.io/omnidoc-router:dev \
              --target-port 8500 \
              --ingress external \
              --registry-server ${{ env.ACR_NAME }}.azurecr.io \
              --registry-username ${{ steps.acr-creds.outputs.ACR_USERNAME }} \
              --registry-password ${{ steps.acr-creds.outputs.ACR_PASSWORD }} \
              --cpu 0.25 \
              --memory 0.5Gi \
              --min-replicas 1 \
              --max-replicas 2 \
              --env-vars \
                "MONGO_DB_URL=${{ secrets.MONGO_DB_URL }}" \
                "MONGO_DB_NAME=${{ secrets.MONGO_DB_NAME }}" \
                "REDIS_URL=" \
                "SESSION_TTL_SECONDS=259200" \
                "REGISTERED_WORKFLOW_COLLECTION_NAME=${{ secrets.REGISTERED_WORKFLOW_COLLECTION_NAME }}" \
                "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" \
                "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
                "AGENTICAPI_BASE_URL=${{ secrets.AGENTICAPI_BASE_URL }}"
          fi

      - name: Get Container App URL
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "🚀 Router dev deployment successful!"
          echo "📍 Router URL: https://$APP_URL"
