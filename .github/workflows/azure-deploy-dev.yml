name: Deploy Router to Azure Container Apps (Development)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: omnidoc_developers
  AZURE_LOCATION: switzerlandnorth
  ACR_NAME: omnidoc
  CONTAINER_APP_NAME: router-dev
  CONTAINER_APP_ENV: omnidoc-dev-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Container Apps Environment exists
        run: |
          if ! az containerapp env show --name ${{ env.CONTAINER_APP_ENV }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} &> /dev/null; then
            echo "Container Apps Environment does not exist. Creating..."
            az containerapp env create \
              --name ${{ env.CONTAINER_APP_ENV }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }}
          else
            echo "Container Apps Environment already exists."
          fi

      - name: Build and push to Azure Container Registry
        run: |
          # Enable admin credentials on ACR
          az acr update --name ${{ env.ACR_NAME }} --admin-enabled true
          
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image omnidoc-router:dev \
            --image omnidoc-router:dev-${{ github.sha }} \
            --file ./Dockerfile \
            .

      - name: Get ACR Credentials
        id: acr-creds
        run: |
          # Ensure admin is enabled
          az acr update --name ${{ env.ACR_NAME }} --admin-enabled true
          
          # Wait a moment for admin to be fully enabled
          sleep 5
          
          # Get credentials
          ACR_USERNAME=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} --query passwords[0].value -o tsv)
          ACR_LOGIN_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --query loginServer -o tsv)
          
          echo "::add-mask::$ACR_PASSWORD"
          echo "ACR_USERNAME=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_OUTPUT
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
          
          echo "ACR Login Server: $ACR_LOGIN_SERVER"

      - name: Deploy to Azure Container Apps
        run: |
          # Check if container app exists and its state
          if az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} &> /dev/null; then
            PROVISIONING_STATE=$(az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.provisioningState -o tsv)
            echo "Container app exists with state: $PROVISIONING_STATE"
            
            if [ "$PROVISIONING_STATE" == "Failed" ]; then
              echo "Container app is in Failed state. Deleting and recreating..."
              az containerapp delete --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --yes
              echo "Deleted failed container app. Recreating..."
              
              # Create new container app using Azure Key Vault for secrets
              az containerapp create \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --environment ${{ env.CONTAINER_APP_ENV }} \
                --image ${{ steps.acr-creds.outputs.ACR_LOGIN_SERVER }}/omnidoc-router:dev-${{ github.sha }} \
                --target-port 8500 \
                --ingress external \
                --registry-server ${{ steps.acr-creds.outputs.ACR_LOGIN_SERVER }} \
                --registry-username ${{ steps.acr-creds.outputs.ACR_USERNAME }} \
                --registry-password ${{ steps.acr-creds.outputs.ACR_PASSWORD }} \
                --cpu 0.25 \
                --memory 0.5Gi \
                --min-replicas 1 \
                --max-replicas 2 \
                --env-vars \
                  "AZURE_KEY_VAULT_URL=https://omnidoc-vault.vault.azure.net/" \
                  "PINECONE_INDEX_NAME=llama-text-embed-v2-index" \
                  "AZ_COSMOS_DB_NAME=omnidoc-backend-dev" \
                  "AZ_COSMOS_DB_REGISTERED_WORKFLOWS_COLLECTION=registeredWorkflows" \
                  "AZ_COSMOS_DB_CHAT_SESSIONS_COLLECTION=chat_sessions" \
                  "SESSION_TTL_SECONDS=259200" \
                  "STORAGE_BACKEND=azure" \
                  "AZ_BLOB_BASE_DIRECTORY=knowledge_base" \
                  "AZ_BLOB_CONTAINER_NAME=knowledge-base" \
                  "AZ_BLOB_STORAGE_ACCOUNT_NAME=omnidocdev"
              
              echo "✅ Container app recreated successfully"
            else
              echo "Container app is healthy. Updating image..."
              az containerapp registry set \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --server ${{ steps.acr-creds.outputs.ACR_LOGIN_SERVER }} \
                --username ${{ steps.acr-creds.outputs.ACR_USERNAME }} \
                --password ${{ steps.acr-creds.outputs.ACR_PASSWORD }}
              
              az containerapp update \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --image ${{ steps.acr-creds.outputs.ACR_LOGIN_SERVER }}/omnidoc-router:dev-${{ github.sha }}
              
              echo "✅ Image and secrets updated successfully"
            fi
          else
            echo "Container app does not exist. Creating new one..."
            
            # Create container app using Azure Key Vault for secrets
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_APP_ENV }} \
              --image ${{ steps.acr-creds.outputs.ACR_LOGIN_SERVER }}/omnidoc-router:dev-${{ github.sha }} \
              --target-port 8500 \
              --ingress external \
              --registry-server ${{ steps.acr-creds.outputs.ACR_LOGIN_SERVER }} \
              --registry-username ${{ steps.acr-creds.outputs.ACR_USERNAME }} \
              --registry-password ${{ steps.acr-creds.outputs.ACR_PASSWORD }} \
              --cpu 0.25 \
              --memory 0.5Gi \
              --min-replicas 1 \
              --max-replicas 2 \
              --env-vars \
                "AZURE_KEY_VAULT_URL=https://omnidoc-vault.vault.azure.net/" \
                "PINECONE_INDEX_NAME=llama-text-embed-v2-index" \
                "AZ_COSMOS_DB_NAME=omnidoc-backend-dev" \
                "AZ_COSMOS_DB_REGISTERED_WORKFLOWS_COLLECTION=registeredWorkflows" \
                "AZ_COSMOS_DB_CHAT_SESSIONS_COLLECTION=chat_sessions" \
                "SESSION_TTL_SECONDS=259200" \
                "STORAGE_BACKEND=azure" \
                "AZ_BLOB_BASE_DIRECTORY=knowledge_base" \
                "AZ_BLOB_CONTAINER_NAME=knowledge-base" \
                "AZ_BLOB_STORAGE_ACCOUNT_NAME=omnidocdev"
            
            echo "✅ Container app created successfully using Key Vault for secrets"
          fi

      - name: Get Container App URL
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "🚀 Router dev deployment successful!"
          echo "📍 Router URL: https://$APP_URL"
